name: Build and test

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]

jobs:
  build-and-test:
    uses: GTNewHorizons/GTNH-Actions-Workflows/.github/workflows/build-and-test.yml@master
    secrets: inherit
    with:
      # Pulls declared dependencies (GT5-Unofficial) into the test server's
      # mods folder, so the runServer smoke test doesn't fail on a missing-mod
      # check that's actually correct behavior (this mod genuinely requires
      # GregTech, which the bare test server doesn't have by default).
      external-deps-inclusion: true
