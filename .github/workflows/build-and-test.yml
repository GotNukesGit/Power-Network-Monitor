name: Build and test

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]

jobs:
  build-and-test:
    uses: GTNewHorizons/GTNH-Actions-Workflows/.github/workflows/build-and-test.yml@master
    secrets: inherit
    with:
      # client-only skips the runServer smoke test entirely. This mod hard-
      # depends on GregTech (declared in @Mod), and the generic test server
      # doesn't have GT installed -- same situation hit on the Research Map
      # project, where client-only: true was the confirmed fix (external-deps-
      # inclusion was tried first tonight and did NOT resolve it).
      client-only: true
